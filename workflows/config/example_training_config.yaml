# Example config for XGBoost training workflow
# Usage: python workflows/xgboost_workflow_master.py -i /path/to/this/file.yaml
# The working_dir is set to the directory containing this config file.

common:
  debug: false
  job_type: slurm  # or "local" if supported

default:
  cpus-per-task: 8
  mem: 16G
  time: "24:00:00"

parameter:
  xgboost_training:
    input_data: /path/to/train.csv
    output_dir: /path/to/output
    task: classification  # or regression
    test_path: /path/to/test.csv  # optional
    n_trials: 50
    cv_folds: 5
    skip_optuna: false
    use_feature_selection: false
    calculate_confidence: true
    cache_features: true
